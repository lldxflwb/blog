baseURL = 'https://lldxflwb.github.io/blog/'
languageCode = 'zh-cn'
title = "Karl's AI Notes"
theme = 'PaperMod'
googleAnalytics = 'G-WSH260T32E'

[params]
  description = 'Claude Code Skills 开发笔记：AI 编程工具、Codex CLI 集成、TikZ 图表渲染、墨水屏阅读器、开发效率提升'
  keywords = ['Claude Code', 'AI 编程', 'Codex', 'TikZ', 'Skills', 'LaTeX', '墨水屏', '开发工具', 'Anthropic', 'GPT']
  author = 'Karl'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "Karl's AI Notes"
    Content = "Claude Code Skills 开发实践：AI 工具集成、图表渲染、墨水屏阅读器"

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/lldxflwb'

  # Open Graph / Twitter Card
  [params.cover]
    responsiveImages = true

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20

[outputs]
  home = ['HTML', 'RSS', 'JSON']
