baseURL = 'https://lldxflwb.github.io/blog/'
languageCode = 'zh-cn'
title = "Karl's AI Notes"
theme = 'PaperMod'
googleAnalytics = 'G-WSH260T32E'

[params]
  description = '关于 AI 工具、编程与效率的阶段性总结'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

[params.homeInfoParams]
  Title = "Hi there"
  Content = "AI 工具使用心得与技术笔记"

[[params.socialIcons]]
  name = 'github'
  url = 'https://github.com/lldxflwb'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20

[outputs]
  home = ['HTML', 'RSS', 'JSON']
